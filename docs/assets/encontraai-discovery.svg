<svg xmlns="http://www.w3.org/2000/svg" width="1826" height="948" viewBox="0 0 1826 948" role="img" aria-labelledby="title desc">
  <title id="title">Encontra.ai discovery workspace</title>
  <desc id="desc">Discovery screen showing a guided search, preview filters, selected companies, and save actions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#faf7ff"/>
      <stop offset="1" stop-color="#ebe5ff"/>
    </linearGradient>
    <linearGradient id="button" x1="0" x2="1">
      <stop offset="0" stop-color="#6d28d9"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#2f263d" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1826" height="948" fill="url(#bg)"/>
  <circle cx="1660" cy="70" r="250" fill="#8b5cf6" opacity="0.10"/>
  <circle cx="160" cy="890" r="300" fill="#84cc16" opacity="0.08"/>

  <g transform="translate(90 28)">
    <text x="0" y="12" fill="#6d28d9" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="3">DISCOVERY</text>
    <text x="0" y="66" fill="#21182f" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="850">Find companies</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="90" y="112" width="1712" height="275" rx="30" fill="rgba(255,255,255,0.52)" stroke="#dfd4ff"/>
    <text x="112" y="153" fill="#756b86" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="2">MODE</text>
    <rect x="112" y="171" width="152" height="57" rx="18" fill="#fff" stroke="#6d28d9"/>
    <text x="148" y="205" fill="#21182f" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">City/region</text>
    <rect x="264" y="171" width="156" height="57" rx="18" fill="rgba(255,255,255,0.40)" stroke="#e5dcff"/>
    <text x="300" y="205" fill="#756b86" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Coordinates</text>

    <text x="436" y="153" fill="#756b86" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="2">WHAT DO YOU WANT TO FIND?</text>
    <rect x="436" y="169" width="500" height="61" rx="17" fill="#fff" stroke="#e5dcff"/>
    <text x="486" y="206" fill="#21182f" font-family="Inter, Arial, sans-serif" font-size="18">dental clinics in San Francisco</text>

    <text x="952" y="153" fill="#756b86" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="2">CITY OR REGION</text>
    <rect x="952" y="169" width="390" height="61" rx="17" fill="#fff" stroke="#e5dcff"/>
    <text x="1002" y="206" fill="#21182f" font-family="Inter, Arial, sans-serif" font-size="18">San Francisco</text>

    <text x="1358" y="153" fill="#756b86" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="2">PER TERM</text>
    <rect x="1358" y="169" width="187" height="61" rx="17" fill="#fff" stroke="#e5dcff"/>
    <text x="1376" y="206" fill="#21182f" font-family="Inter, Arial, sans-serif" font-size="18">10</text>
    <rect x="1560" y="169" width="225" height="61" rx="17" fill="url(#button)"/>
    <text x="1608" y="206" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="850">Find companies</text>

    <text x="112" y="273" fill="#756b86" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="850" letter-spacing="2">DEMO /</text>
    <rect x="185" y="247" width="228" height="33" rx="16" fill="#efe8ff"/>
    <text x="201" y="268" fill="#21182f" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Dental clinics in San Francisco</text>
    <text x="432" y="268" fill="#756b86" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Restaurants in New York</text>
    <text x="650" y="268" fill="#756b86" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Aesthetic clinics in London</text>
    <line x1="112" y1="306" x2="1784" y2="306" stroke="#e5dcff"/>
    <rect x="112" y="320" width="829" height="50" rx="20" fill="#fff" stroke="#e5dcff"/>
    <text x="124" y="350" fill="#21182f" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">Location</text>
    <rect x="952" y="320" width="832" height="50" rx="20" fill="#fff" stroke="#e5dcff"/>
    <text x="964" y="350" fill="#21182f" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">Search terms</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="90" y="413" width="1712" height="500" rx="30" fill="rgba(255,255,255,0.50)" stroke="#dfd4ff"/>
    <text x="112" y="463" fill="#21182f" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">Search preview</text>
    <rect x="257" y="434" width="122" height="42" rx="21" fill="#f0eaff" stroke="#ded4ff"/>
    <text x="272" y="462" fill="#756b86" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Results</text>
    <text x="345" y="462" fill="#21182f" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850">10</text>
    <rect x="389" y="434" width="164" height="42" rx="21" fill="#f0eaff" stroke="#ded4ff"/>
    <text x="403" y="462" fill="#756b86" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">With website</text>
    <text x="514" y="462" fill="#21182f" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850">8</text>

    <rect x="1223" y="548" width="126" height="42" rx="15" fill="url(#button)"/>
    <text x="1239" y="575" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="850">Save selected</text>
    <rect x="1360" y="548" width="149" height="42" rx="15" fill="#fff" stroke="#e5dcff"/>
    <text x="1381" y="575" fill="#21182f" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Recover websites</text>
    <rect x="1520" y="548" width="130" height="42" rx="15" fill="#fff" stroke="#e5dcff"/>
    <text x="1541" y="575" fill="#21182f" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Enrich selected</text>

    <line x1="112" y1="531" x2="1784" y2="531" stroke="#e5dcff"/>
    <rect x="112" y="552" width="108" height="31" rx="16" fill="#f0eaff" stroke="#ded4ff"/>
    <text x="124" y="573" fill="#756b86" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Selected</text>
    <text x="188" y="573" fill="#21182f" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="850">10</text>
    <rect x="112" y="604" width="1670" height="46" rx="18" fill="#eee5ff" stroke="#c4a7ff"/>
    <text x="127" y="634" fill="#21182f" font-family="Inter, Arial, sans-serif" font-size="16">Preview ready. 10 new companies found; 8 with website or domain and 2 without site.</text>

    <rect x="112" y="671" width="1670" height="240" rx="22" fill="rgba(255,255,255,0.58)" stroke="#e5dcff"/>
    <text x="194" y="704" fill="#756b86" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="850">COMPANY</text>
    <text x="658" y="704" fill="#756b86" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="850">LOCATION</text>
    <text x="896" y="704" fill="#756b86" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="850">CONTACT</text>
    <text x="1312" y="704" fill="#756b86" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="850">EXCLUSION</text>
    <line x1="112" y1="724" x2="1782" y2="724" stroke="#e5dcff"/>

    <rect x="127" y="690" width="20" height="20" rx="5" fill="#7c3aed"/>
    <text x="194" y="760" fill="#21182f" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="850">Mission Bay Dental</text>
    <text x="194" y="787" fill="#756b86" font-family="Inter, Arial, sans-serif" font-size="15">Dental clinic</text>
    <text x="658" y="760" fill="#21182f" font-family="Inter, Arial, sans-serif" font-size="17">San Francisco, CA</text>
    <text x="658" y="786" fill="#756b86" font-family="Inter, Arial, sans-serif" font-size="15">Market Street, 120</text>
    <text x="896" y="760" fill="#21182f" font-family="Inter, Arial, sans-serif" font-size="16">+1 415 551000</text>
    <text x="896" y="813" fill="#6d28d9" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">hello@mission-bay-dental.example</text>
    <rect x="1312" y="740" width="115" height="31" rx="9" fill="#e9fbf3" stroke="#7fe1b9"/>
    <text x="1324" y="761" fill="#047857" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Ready to save</text>

    <line x1="112" y1="873" x2="1782" y2="873" stroke="#e5dcff"/>
    <text x="194" y="914" fill="#21182f" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="850">Pacific Smile Studio</text>
